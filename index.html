<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>แอปจัดตารางเวลาของ Yotsapun</title>
    <link
      rel="icon"
      href="https://cdn-icons-png.flaticon.com/512/566/566058.png"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #007aff;
        --bg: #f2f2f7;
        --card: #ffffff;
        --text: #1c1c1e;
        --active-color: #ffcc00;
        --active-bg: #fffbe6;
      }
      body {
        font-family: "Kanit", sans-serif;
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        padding: 20px;
      }
      .container {
        max-width: 1000px;
        margin: auto;
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 20px;
      }
      .card {
        background: var(--card);
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        margin-bottom: 20px;
      }
      .timer-display {
        font-size: 48px;
        font-weight: 600;
        text-align: center;
        margin: 10px 0;
      }
      .now-doing {
        text-align: center;
        padding: 15px;
        background: #e5e5ea;
        border-radius: 15px;
        margin-bottom: 15px;
      }
      .now-doing.active-status {
        background: var(--active-bg);
        border: 2px solid var(--active-color);
      }
      .now-doing strong {
        font-size: 20px;
        color: #d4a000;
      }
      .btn-group {
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
      }
      button {
        font-family: "Kanit";
        border: none;
        padding: 10px 15px;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.2s;
        font-weight: 500;
      }
      .btn-main {
        background: var(--primary);
        color: white;
      }
      .btn-alt {
        background: #e5e5ea;
      }
      .tab-group {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
        margin-bottom: 15px;
      }
      .tab-group button {
        background: #e5e5ea;
      }
      .tab-group button.active {
        background: var(--active-color);
        font-weight: bold;
      }

      /* ปรับให้มีพื้นที่วางปุ่มแก้ไขและปุ่มลบ */
      .schedule-row {
        display: grid;
        grid-template-columns: 100px 1fr 120px;
        align-items: center;
        padding: 15px;
        background: #f9f9fb;
        border-radius: 15px;
        margin-bottom: 8px;
        border: 2px solid transparent;
      }
      .schedule-row.active-now {
        border-color: var(--active-color);
        background: var(--active-bg);
        transform: scale(1.02);
      }
      .action-btns {
        display: flex;
        gap: 5px;
        justify-content: flex-end;
      }
      .btn-edit {
        background: #ff9500;
        color: white;
        font-size: 12px;
        padding: 5px 10px;
        border-radius: 8px;
      }
      .btn-delete {
        background: #ff3b30;
        color: white;
        font-size: 12px;
        padding: 5px 10px;
        border-radius: 8px;
      }

      #editModal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        justify-content: center;
        align-items: center;
        z-index: 999;
      }
      .modal-content {
        background: white;
        padding: 25px;
        border-radius: 20px;
        width: 320px;
      }
      input {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 10px;
        border: 1px solid #ddd;
        box-sizing: border-box;
      }
      @media (max-width: 768px) {
        .container {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="sidebar">
        <div class="card">
          <div id="statusBox" class="now-doing">
            <span>ตอนนี้ต้องทำ...</span><br /><strong id="currentTaskLabel"
              >กำลังโหลด...</strong
            >
          </div>
          <div class="timer-display" id="stopwatch">00:00:00</div>
          <div class="btn-group">
            <button class="btn-main" onclick="toggleTimer()" id="btnStart">
              เริ่มจับเวลา
            </button>
            <button class="btn-alt" onclick="resetTimer()">รีเซ็ต</button>
          </div>
          <button
            onclick="enableSound()"
            id="soundBtn"
            style="
              width: 100%;
              margin-top: 10px;
              background: #ff9500;
              color: white;
            "
          >
            🔔 คลิกที่นี่เพื่อเปิดเสียงแจ้งเตือน
          </button>
        </div>
        <div class="card">
          <button class="btn-main" style="width: 100%" onclick="openEditor(-1)">
            ➕ เพิ่มกิจกรรมใหม่
          </button>
          <button
            onclick="resetToDefault()"
            style="
              width: 100%;
              margin-top: 10px;
              background: #ff3b30;
              color: white;
              font-size: 11px;
            "
          >
            ⚠️ รีเซ็ตตารางทั้งหมดกลับเป็นค่าเริ่มต้น
          </button>
        </div>
      </div>
      <div class="content">
        <div class="tab-group" id="tabsContainer"></div>
        <div class="card"><div id="scheduleContainer"></div></div>
      </div>
    </div>

    <div id="editModal">
      <div class="modal-content">
        <h3 id="modalTitle">จัดการกิจกรรม</h3>
        <input type="hidden" id="editIndex" value="-1" />
        <label>เวลาเริ่ม (เช่น 08:00)</label>
        <input
          type="text"
          id="editStartTime"
          placeholder="00:00"
          maxlength="5"
        />
        <label>เวลาจบ (เช่น 09:00)</label>
        <input type="text" id="editEndTime" placeholder="00:00" maxlength="5" />
        <label>ชื่อกิจกรรม</label>
        <input type="text" id="editTitle" placeholder="เช่น 🎮 เล่นเกม" />
        <div class="btn-group" style="margin-top: 15px">
          <button class="btn-main" onclick="saveTask()">บันทึก</button>
          <button class="btn-alt" onclick="closeEditor()">ยกเลิก</button>
        </div>
      </div>
    </div>

    <audio
      id="alertSound"
      src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"
    ></audio>
    <audio
      id="clickSound"
      src="https://actions.google.com/sounds/v1/buttons/button_click.ogg"
    ></audio>

    <script>
      const defaultSchedules = {
        "ตื่น 8:00": [
          { start: "08:00", end: "08:30", task: "ตื่น + ล้างหน้า" },
          { start: "08:30", end: "09:30", task: "🎮 เล่นเกม" },
          { start: "10:00", end: "10:20", task: "🍽️ กินข้าว" },
          { start: "10:30", end: "11:50", task: "📚 อ่าน (รอบ 1)" },
          { start: "11:50", end: "13:00", task: "🎮 เล่นเกม" },
          { start: "13:30", end: "13:50", task: "🍽️ กินข้าว" },
          { start: "14:00", end: "15:20", task: "📚 อ่าน (รอบ 2)" },
          { start: "15:20", end: "16:30", task: "🎮 เล่นเกม" },
          { start: "16:30", end: "17:50", task: "📚 อ่าน (รอบ 3)" },
          { start: "18:30", end: "18:50", task: "🍽️ กินข้าว" },
          { start: "18:50", end: "19:20", task: "🚿 อาบน้ำ" },
          { start: "19:30", end: "20:50", task: "📚 อ่าน (รอบ 4 ครบ 4 ชม.)" },
          { start: "21:00", end: "22:30", task: "🎮 เล่นเกม" },
          { start: "22:30", end: "23:59", task: "😴 นอน" },
        ],
        "ตื่น 9:00": [
          { start: "09:00", end: "09:30", task: "ตื่น + ล้างหน้า" },
          { start: "09:30", end: "10:00", task: "🎮 เล่นเกม" },
          { start: "10:00", end: "10:20", task: "🍽️ กินข้าว" },
          { start: "10:30", end: "11:50", task: "📚 อ่าน (รอบ 1)" },
          { start: "11:50", end: "13:00", task: "🎮 เล่นเกม" },
          { start: "13:30", end: "13:50", task: "🍽️ กินข้าว" },
          { start: "14:00", end: "15:20", task: "📚 อ่าน (รอบ 2)" },
          { start: "15:20", end: "16:30", task: "🎮 เล่นเกม" },
          { start: "16:30", end: "17:50", task: "📚 อ่าน (รอบ 3)" },
          { start: "18:30", end: "18:50", task: "🍽️ กินข้าว" },
          { start: "18:50", end: "19:20", task: "🚿 อาบน้ำ" },
          { start: "19:30", end: "20:50", task: "📚 อ่าน (รอบ 4 ครบ 4 ชม.)" },
          { start: "21:00", end: "22:30", task: "🎮 เล่นเกม" },
          { start: "22:30", end: "23:59", task: "😴 นอน" },
        ],
      };

      // เปลี่ยนชื่อความจำใหม่เป็น v5 เพื่อเคลียร์ของเก่า
      let schedules =
        JSON.parse(localStorage.getItem("mySchedules_v5")) || defaultSchedules;
      let activeTable = Object.keys(schedules)[0] || "ตื่น 8:00";
      let lastKnownTask = "";
      let isSoundEnabled = false;

      function enableSound() {
        isSoundEnabled = true;
        playAudio("clickSound");
        document.getElementById("soundBtn").innerText =
          "✅ ระบบเสียงพร้อมทำงาน";
        document.getElementById("soundBtn").style.backgroundColor = "#34c759";
      }

      function playAudio(id) {
        const sound = document.getElementById(id);
        if (sound) {
          sound.currentTime = 0;
          sound.play().catch(() => {});
        }
      }

      function renderTabs() {
        const container = document.getElementById("tabsContainer");
        container.innerHTML = "";
        Object.keys(schedules).forEach((name) => {
          const btn = document.createElement("button");
          btn.innerText = name;
          btn.className = name === activeTable ? "active" : "";
          btn.onclick = () => {
            activeTable = name;
            const now = new Date();
            const curTime = `${String(now.getHours()).padStart(
              2,
              "0"
            )}:${String(now.getMinutes()).padStart(2, "0")}`;
            lastKnownTask = getTaskAt(name, curTime);
            renderTabs();
            renderSchedule();
          };
          container.appendChild(btn);
        });
      }

      function getTaskAt(tableName, time) {
        let task = "เวลาว่าง";
        if (schedules[tableName]) {
          schedules[tableName].forEach((item) => {
            if (time >= item.start && time < item.end) task = item.task;
          });
        }
        return task;
      }

      function renderSchedule() {
        const container = document.getElementById("scheduleContainer");
        container.innerHTML = "";
        const now = new Date();
        const curTime = `${String(now.getHours()).padStart(2, "0")}:${String(
          now.getMinutes()
        ).padStart(2, "0")}`;
        let curTask = getTaskAt(activeTable, curTime);

        if (schedules[activeTable]) {
          schedules[activeTable].forEach((item, index) => {
            const isActive = curTime >= item.start && curTime < item.end;
            container.innerHTML += `
              <div class="schedule-row ${isActive ? "active-now" : ""}">
                <div class="time-col">${item.start}-${item.end}</div>
                <div class="task-col">${item.task}</div>
                <div class="action-btns">
                  <button class="btn-edit" onclick="openEditor(${index})">✏️ แก้ไข</button>
                  <button class="btn-delete" onclick="deleteTask(${index})">🗑️ ลบ</button>
                </div>
              </div>`;
          });
        }

        document.getElementById("currentTaskLabel").innerText = curTask;

        if (
          lastKnownTask !== "" &&
          lastKnownTask !== curTask &&
          isSoundEnabled
        ) {
          playAudio("alertSound");
          setTimeout(() => playAudio("alertSound"), 1000);
          setTimeout(() => playAudio("alertSound"), 2000);
        }
        lastKnownTask = curTask;
      }

      function resetToDefault() {
        if (confirm("ต้องการล้างข้อมูลเพื่อกลับไปใช้ตารางเดิมใช่ไหม?")) {
          localStorage.removeItem("mySchedules_v5");
          location.reload();
        }
      }

      // ระบบเพิ่มและแก้ไขกิจกรรม
      function openEditor(index) {
        document.getElementById("editModal").style.display = "flex";
        document.getElementById("editIndex").value = index;

        if (index > -1) {
          // กรณีแก้ไข: ดึงข้อมูลเก่ามาโชว์
          document.getElementById("modalTitle").innerText = "✏️ แก้ไขกิจกรรม";
          document.getElementById("editStartTime").value =
            schedules[activeTable][index].start;
          document.getElementById("editEndTime").value =
            schedules[activeTable][index].end;
          document.getElementById("editTitle").value =
            schedules[activeTable][index].task;
        } else {
          // กรณีเพิ่มใหม่: ทำช่องให้ว่าง
          document.getElementById("modalTitle").innerText =
            "➕ เพิ่มกิจกรรมใหม่";
          document.getElementById("editStartTime").value = "";
          document.getElementById("editEndTime").value = "";
          document.getElementById("editTitle").value = "";
        }
      }

      function closeEditor() {
        document.getElementById("editModal").style.display = "none";
      }

      function saveTask() {
        const s = document.getElementById("editStartTime").value;
        const e = document.getElementById("editEndTime").value;
        const t = document.getElementById("editTitle").value;
        const index = parseInt(document.getElementById("editIndex").value);

        // เช็คว่ากรอกข้อมูลครบถ้วนไหม
        if (s.length === 5 && e.length === 5 && t) {
          if (index > -1) {
            // ถ้าเป็นการแก้ไข ให้เอาข้อมูลใหม่ไปทับของเก่า
            schedules[activeTable][index] = { start: s, end: e, task: t };
          } else {
            // ถ้าเป็นการสร้างใหม่ ให้เพิ่มต่อท้าย
            schedules[activeTable].push({ start: s, end: e, task: t });
          }

          // เรียงเวลาให้ใหม่ด้วย
          schedules[activeTable].sort((a, b) => a.start.localeCompare(b.start));
          localStorage.setItem("mySchedules_v5", JSON.stringify(schedules));
          renderSchedule();
          closeEditor();
        } else {
          alert("กรุณาใส่เวลาให้ครบ (เช่น 08:00) และใส่ชื่อกิจกรรมด้วยครับ!");
        }
      }

      function deleteTask(index) {
        if (confirm("ลบกิจกรรมนี้?")) {
          schedules[activeTable].splice(index, 1);
          localStorage.setItem("mySchedules_v5", JSON.stringify(schedules));
          renderSchedule();
        }
      }

      let seconds = 0,
        timer;
      function toggleTimer() {
        if (!timer) {
          timer = setInterval(() => {
            seconds++;
            const h = String(Math.floor(seconds / 3600)).padStart(2, "0");
            const m = String(Math.floor((seconds % 3600) / 60)).padStart(
              2,
              "0"
            );
            const s = String(seconds % 60).padStart(2, "0");
            document.getElementById("stopwatch").innerText = `${h}:${m}:${s}`;
          }, 1000);
          document.getElementById("btnStart").innerText = "หยุด";
        } else {
          clearInterval(timer);
          timer = null;
          document.getElementById("btnStart").innerText = "ต่อ";
        }
      }

      function resetTimer() {
        clearInterval(timer);
        timer = null;
        seconds = 0;
        document.getElementById("stopwatch").innerText = "00:00:00";
      }

      renderTabs();
      renderSchedule();
      setInterval(renderSchedule, 10000);
    </script>
  </body>
</html>
